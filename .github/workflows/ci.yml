name: CI

# Runs on every push to main + every PR. Blocks merges if either the
# TypeScript check or eslint fails — catches the mid-content file
# truncation pattern that hit production multiple times this week
# before a human reviewer noticed.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # `npm ci` is stricter than `npm install` — fails fast if
      # package-lock.json drifts from package.json, which is exactly
      # the kind of supply-chain surprise we want surfaced in CI.
      - name: Install dependencies
        run: npm ci

      # tsc with --noEmit is the primary safety net — it catches the
      # "expected closing tag" / "unterminated string literal" errors
      # that happen when a file gets truncated mid-content.
      - name: TypeScript check
        run: npx tsc --noEmit -p tsconfig.json

      # ESLint catches React-rules-of-hooks, react-hooks/purity, etc.
      # `--quiet` ignores warnings so the gate is fail-only on errors.
      - name: ESLint
        run: npx eslint --quiet .
