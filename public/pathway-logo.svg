<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 96" fill="none">
  <defs>
    <linearGradient id="piGrad" x1="10" y1="96" x2="68" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c2840"/>
      <stop offset="1" stop-color="#1a8585"/>
    </linearGradient>
  </defs>

  <!-- i-dot (circle above right stem) -->
  <circle cx="56" cy="11" r="11" fill="url(#piGrad)"/>

  <!-- pi ligature: left p-stem + arched bowl at top + right i-stem -->
  <path d="M 14 84 L 14 28 Q 14 6 35 6 Q 56 6 56 28 L 56 84"
        stroke="url(#piGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- PATHWAY INTERMEDIATES USA -->
  <text x="86" y="36" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="21" font-weight="900" fill="#0c2840">PATHWAY</text>
  <text x="86" y="58" font-family="'Helvetica Neue', Arial, Helvetica, sans-serif"
        font-size="12.5" font-weight="700" fill="#0c2840" letter-spacing="1.8">INTERMEDIATES</text>
  <text x="87" y="78" font-family="'Helvetica Neue', Arial, Helvetica, sans-serif"
        font-size="12.5" font-weight="600" fill="#1a8585" letter-spacing="4">USA</text>
</svg>
